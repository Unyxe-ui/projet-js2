<div class="form-page">
  <div class="form-card">
    <h1>Edit Post</h1>

    {{#if error}}
      <div class="alert alert-error">{{error}}</div>
    {{/if}}

    <form method="POST" action="/post/{{post.id}}/edit" enctype="multipart/form-data" class="post-form">
      <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{post.title}}" required>
      </div>

      <div class="form-group">
        <label for="content">Content</label>
        <textarea id="content" name="content" rows="8" required>{{post.content}}</textarea>
      </div>

      <div class="form-group">
        <label>Categories</label>
        <div class="checkbox-grid">
          {{#each categories}}
            <label class="checkbox-label">
              <input type="checkbox" name="categories" value="{{id}}" {{#if selected}}checked{{/if}}>
              <span>{{name}}</span>
            </label>
          {{/each}}
        </div>
      </div>

      <div class="form-group">
        <label for="image">Replace Image (optional)</label>
        <input type="file" id="image" name="image" accept="image/jpeg,image/png,image/gif,image/webp">
        <small class="form-hint">20 MB maximum — Ne rien indiquer pour conserver l'image actuelle</small>
      </div>

      <div class="form-actions">
        <a href="/post/{{post.id}}" class="btn btn-ghost">Annuler</a>
        <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
      </div>
    </form>
  </div>
</div>
