<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="brand-icon">◆</span>
        <span>Forum</span>
      </a>
      <div class="nav-links">
        {{#if user}}
          <a href="/post/new" class="btn btn-primary btn-sm">+ Nouveau Post</a>
          <span class="nav-user">{{user.username}}</span>
          <a href="/logout" class="btn btn-ghost btn-sm">Déconnection</a>
        {{else}}
          <a href="/login" class="btn btn-ghost btn-sm">Connexion</a>
          <a href="/register" class="btn btn-primary btn-sm">Inscription</a>
        {{/if}}
      </div>
    </div>
  </nav>

  <main class="container">
    {{> content}}
  </main>

  <footer class="footer">
    <p>Forum &mdash; Projet Ynov 2026</p>
  </footer>

  <script src="/static/js/app.js"></script>
</body>
</html>
