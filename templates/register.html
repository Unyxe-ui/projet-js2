<div class="auth-page">
  <div class="auth-card">
    <h1>Register</h1>
    <p class="auth-subtitle">Join the conversation</p>

    {{#if error}}
      <div class="alert alert-error">{{error}}</div>
    {{/if}}

    <form method="POST" action="/register" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{email}}" required autofocus>
      </div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="{{username}}" minlength="3" maxlength="30" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" minlength="6" required>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Inscription</button>
    </form>

    <p class="auth-footer">Vous n'avez pas de compte ? <a href="/login">Connexion</a></p>
  </div>
</div>
